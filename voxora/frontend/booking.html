<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Voxora | Booking</title>

    <!-- Voxora main theme -->
    <link rel="stylesheet" href="css/styles.css?v=1.1">

    <!-- Google Font (already used in Voxora) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="app-container">

        <!-- 2. LEFT PANEL – AI AVATAR & VOICE -->
        <aside class="left-panel">
            <div class="brand">
                <i class="ph-fill ph-waves"></i>
                <span>VOXORA</span>
            </div>

            <div class="avatar-container">
                <div class="avatar-halo"></div>
                <img src="assets/avatar.png" alt="AI Avatar" class="avatar-img">
            </div>

            <div class="voice-status">
                <div class="chat-bubble">
                    “Looking for flights or hotels? Let me know.”
                </div>

                <div class="mic-btn-container">
                    <div class="mic-btn-ring"></div>
                    <div class="mic-btn">
                        <i class="ph-fill ph-microphone"></i>
                    </div>
                </div>

                <div class="status-text">Ready</div>
            </div>
        </aside>

        <nav class="top-nav">
            <div class="nav-links">
                <a href="dashboard.html" class="nav-item">
                    <i class="ph ph-squares-four"></i> Dashboard
                </a>
                <a href="#" class="nav-item">
                    <i class="ph ph-users-three"></i> Meetings
                </a>
                <a href="booking.html" class="nav-item active">
                    <i class="ph ph-calendar-check"></i> Bookings
                </a>
                <a href="calls.html" class="nav-item">
                    <i class="ph ph-phone-call"></i> Calls
                </a>
                <a href="data-intelligence.html" class="nav-item">
                    <i class="ph ph-brain"></i> Data Intelligence
                </a>
                <a href="market.html" class="nav-item">
                    <i class="ph ph-chart-line-up"></i> Market
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="ph ph-scroll"></i> Reports
                </a>
                <a href="ai-itinerary.html" class="nav-item">
                    <i class="ph ph-map-trifold"></i> AI Itinerary
                </a>
            </div>
            <div class="nav-clock">
                <span id="clock"></span>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <div class="page-header">
                <h1 class="page-title">AI Travel Assistant</h1>
                <p class="page-subtitle">Real-time flight and hotel search powered by Voxora</p>
            </div>

            <!-- SEARCH TABS -->
            <div class="card card-g-12">
                <div class="booking-tabs"
                    style="display: flex; gap: 2rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 1rem;">
                    <button id="tabFlights" class="tab-btn active" onclick="switchTab('flights')"
                        style="background: none; border: none; color: var(--accent-primary); font-weight: 600; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem;">
                        <i class="ph ph-airplane"></i> Flights
                    </button>
                    <button id="tabHotels" class="tab-btn" onclick="switchTab('hotels')"
                        style="background: none; border: none; color: var(--text-secondary); font-weight: 600; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem;">
                        <i class="ph ph-buildings"></i> Hotels
                    </button>
                </div>

                <!-- FLIGHT SEARCH FORM -->
                <form id="flightForm" class="neon-form">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                        <div class="input-group">
                            <label
                                style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Origin
                                (IATA Code)</label>
                            <input type="text" id="origin" placeholder="e.g. JFK" required maxlength="3"
                                style="width: 100%;">
                        </div>
                        <div class="input-group">
                            <label
                                style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Destination
                                (IATA Code)</label>
                            <input type="text" id="destination" placeholder="e.g. LHR" required maxlength="3"
                                style="width: 100%;">
                        </div>
                        <div class="input-group">
                            <label
                                style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Departure
                                Date</label>
                            <input type="date" id="departureDate" required style="width: 100%;">
                        </div>
                        <div class="input-group">
                            <label
                                style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Adults</label>
                            <input type="number" id="adults" value="1" min="1" required style="width: 100%;">
                        </div>
                    </div>
                    <button type="submit" class="neon-btn"
                        style="width: auto; padding: 0.9rem 2.5rem; margin-top: 1.5rem;">
                        <i class="ph ph-magnifying-glass"></i> Search Flights
                    </button>
                </form>

                <!-- HOTEL SEARCH FORM -->
                <form id="hotelForm" class="neon-form" style="display: none;">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                        <div class="input-group">
                            <label
                                style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">City
                                Code (IATA)</label>
                            <input type="text" id="cityCode" placeholder="e.g. PAR" required maxlength="3"
                                style="width: 100%;">
                        </div>
                        <div class="input-group">
                            <label
                                style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Check-in
                                Date</label>
                            <input type="date" id="checkInDate" required style="width: 100%;">
                        </div>
                        <div class="input-group">
                            <label
                                style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Check-out
                                Date</label>
                            <input type="date" id="checkOutDate" required style="width: 100%;">
                        </div>
                        <div class="input-group">
                            <label
                                style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Guests</label>
                            <input type="number" id="hotelAdults" value="1" min="1" required style="width: 100%;">
                        </div>
                    </div>
                    <button type="submit" class="neon-btn"
                        style="width: auto; padding: 0.9rem 2.5rem; margin-top: 1.5rem;">
                        <i class="ph ph-magnifying-glass"></i> Search Hotels
                    </button>
                </form>
            </div>

            <!-- RESULTS SECTION -->
            <div id="resultsContainer" style="margin-top: 2rem;">
                <div id="searchLoader" style="display: none; text-align: center; padding: 3rem;">
                    <i class="ph ph-spinner-gap"
                        style="font-size: 2.5rem; color: var(--accent-primary); animation: spin 1s linear infinite;"></i>
                    <p style="margin-top: 1rem; color: var(--text-secondary); font-family: 'Roboto Mono';">Fetching live
                        data...</p>
                </div>
                <div id="searchResults" class="dashboard-grid">
                    <!-- Results cards injected here -->
                </div>
            </div>

        </main>
    </div>

    <script src="js/auth.js?v=1.1"></script>
    <script src="js/booking.js?v=1.1"></script>
    <script>
        // Real-time clock
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>

</html>
